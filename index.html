<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Quipu of Conquest — Spanish Camp Decoder</title>
<style>
  body { font-family: sans-serif; margin: 24px; color: #222; }
  .row { margin-bottom: 12px; }
  label { display: inline-block; min-width: 320px; }
  table { border-collapse: collapse; margin-top: 14px; }
  th, td { border: 1px solid #ccc; padding: 4px 12px; font-size: 14px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  th { background: #f0f0f0; }
  button { padding: 6px 14px; cursor: pointer; margin-right: 8px; }
  #plot { margin-top: 20px; }
  #status { color: #b00; margin-top: 8px; }
</style>
</head>
<body>
  <h2>Quipu of Conquest — Spanish Camp Decoder</h2>

  <div class="row">
    <label for="cequeFile">1) Ceque Angle Table CSV (ID, Angle deg):</label>
    <input type="file" id="cequeFile" accept=".csv">
  </div>
  <div class="row">
    <label for="dataFile">2) Turtle / Quipu Data CSV:</label>
    <input type="file" id="dataFile" accept=".csv">
  </div>
  <div class="row">
    <button id="solveBtn">Decode &amp; Plot</button>
    <button id="exportBtn" disabled>Export Results CSV (radian,distance)</button>
  </div>
  <div id="status"></div>

  <h3>Per-turtle breakdown (genuine + decoy)</h3>
  <div id="turtleReport"></div>

  <h3>Final genuine camp locations</h3>
  <table id="resultsTable" style="display:none">
    <thead>
      <tr>
        <th>Turtle</th><th>Ceque ID</th><th>Angle (deg)</th><th>Angle (rad)</th><th>Distance</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="plot"></div>

<script>
function trimTrailingEmpty(fields) {
  const out = fields.map((f) => f.trim());
  while (out.length && out[out.length - 1] === '') out.pop();
  return out;
}

function digitsToNumber(fields) {
  return parseInt(fields.join(''), 10);
}

function mod(n, m) {
  return ((n % m) + m) % m;
}

function parseCequeTable(text) {
  const lines = text.trim().split(/\r?\n/);
  const table = new Map();
  for (const line of lines.slice(1)) {
    const fields = trimTrailingEmpty(line.split(','));
    if (fields.length < 2) continue;
    table.set(Number(fields[0]), Number(fields[1]));
  }
  return table;
}

function parseInput(text) {
  const lines = text.split(/\r?\n/);
  const turtles = new Map(); // id -> { marginal, plastron }
  const records = []; // every S row, genuine or decoy, in encounter order

  let section = null;
  let currentTurtle = null;
  let currentCequeId = null;

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    if (line.startsWith('#')) {
      if (line.includes('TURTLE_DATA')) section = 'TURTLE_DATA';
      else if (line.includes('QUIPU_RECORDS')) section = 'QUIPU_RECORDS';
      continue;
    }

    const fields = trimTrailingEmpty(line.split(','));
    if (fields.length === 0) continue;

    if (section === 'TURTLE_DATA') {
      const [id, marginal, plastron] = fields;
      turtles.set(id, { marginal: Number(marginal), plastron: Number(plastron) });
    } else if (section === 'QUIPU_RECORDS') {
      if (fields.length === 1 && /^T\d+$/.test(fields[0])) {
        currentTurtle = fields[0];
        currentCequeId = null;
      } else if (fields[0] === 'P') {
        currentCequeId = digitsToNumber(fields.slice(1));
      } else if (fields[0] === 'S') {
        const rawDistance = digitsToNumber(fields.slice(1));
        const turtle = turtles.get(currentTurtle);
        const realDistance = rawDistance - currentCequeId * turtle.marginal;
        const requiredMod = turtle.plastron % 5;
        const actualMod = mod(realDistance, 5);
        records.push({
          turtle: currentTurtle,
          cequeId: currentCequeId,
          rawDistance,
          realDistance,
          actualMod,
          requiredMod,
          genuine: actualMod === requiredMod,
        });
      }
    }
  }

  return { turtles, records };
}

function niceRingStep(maxVal, targetRings) {
  if (maxVal <= 0) return 1;
  const raw = maxVal / targetRings;
  const magnitude = 10 ** Math.floor(Math.log10(raw));
  const residual = raw / magnitude;
  const nice = residual < 1.5 ? 1 : residual < 3 ? 2 : residual < 7 ? 5 : 10;
  return nice * magnitude;
}

function polarToXY(cx, cy, angleDeg, r) {
  const theta = (angleDeg * Math.PI) / 180;
  return { x: cx + r * Math.sin(theta), y: cy - r * Math.cos(theta) };
}

function renderPolarSVG(records, cequeTable) {
  const size = 720;
  const cx = size / 2;
  const cy = size / 2;
  const maxR = 290;

  const maxDistance = records.length ? Math.max(...records.map((r) => r.realDistance)) : 100;
  const ringStep = niceRingStep(maxDistance, 4);
  const ringCount = Math.max(1, Math.ceil(maxDistance / ringStep));
  const topValue = ringCount * ringStep;

  const parts = [];
  parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" font-family="sans-serif">`);
  parts.push(`<rect width="${size}" height="${size}" fill="white"/>`);

  for (const [id, angle] of cequeTable.entries()) {
    const p = polarToXY(cx, cy, angle, maxR);
    parts.push(`<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#ddd" stroke-width="1"/>`);
    const lp = polarToXY(cx, cy, angle, maxR + 14);
    parts.push(`<text x="${lp.x.toFixed(1)}" y="${lp.y.toFixed(1)}" font-size="7" fill="#999" text-anchor="middle">${id}:${angle}°</text>`);
  }

  for (let i = 1; i <= ringCount; i++) {
    const r = (i / ringCount) * maxR;
    parts.push(`<circle cx="${cx}" cy="${cy}" r="${r.toFixed(1)}" fill="none" stroke="#bbb" stroke-width="1"/>`);
    parts.push(`<text x="${cx + 4}" y="${(cy - r + 10).toFixed(1)}" font-size="10" fill="#666">${(i * ringStep).toFixed(0)}</text>`);
  }

  parts.push(`<circle cx="${cx}" cy="${cy}" r="4" fill="#333"/>`);
  parts.push(`<text x="${cx + 8}" y="${cy - 8}" font-size="11" fill="#333">Cusco</text>`);

  for (const rec of records) {
    const angleDeg = cequeTable.get(rec.cequeId);
    const angleRad = (angleDeg * Math.PI) / 180;
    const r = (rec.realDistance / topValue) * maxR;
    const p = polarToXY(cx, cy, angleDeg, r);
    parts.push(`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="6" fill="#d62728"/>`);
    parts.push(
      `<text x="${(p.x + 9).toFixed(1)}" y="${(p.y - 9).toFixed(1)}" font-size="11" fill="#d62728" font-weight="bold">${rec.turtle} id=${rec.cequeId} ${angleRad.toFixed(4)}rad r=${rec.realDistance}</text>`
    );
  }

  parts.push(`<text x="10" y="20" font-size="14" fill="#333">Decoded Spanish camp locations relative to Cusco</text>`);
  parts.push('</svg>');

  return parts.join('');
}

function renderTurtleReport(turtles, records, cequeTable) {
  const byTurtle = new Map();
  for (const r of records) {
    if (!byTurtle.has(r.turtle)) byTurtle.set(r.turtle, []);
    byTurtle.get(r.turtle).push(r);
  }

  const blocks = [];
  for (const [turtleId, turtleRecords] of byTurtle.entries()) {
    const t = turtles.get(turtleId);
    let rows = '';
    for (const r of turtleRecords) {
      const verdict = r.genuine
        ? `<span style="color:#1a7f1a;font-weight:bold">GENUINE</span>`
        : `<span style="color:#999">decoy</span>`;
      const angle = r.genuine ? `${cequeTable.get(r.cequeId)}°` : '—';
      rows += `<tr><td>${r.cequeId}</td><td>${r.rawDistance}</td><td>${r.realDistance}</td><td>${r.actualMod}</td><td>${r.requiredMod}</td><td>${angle}</td><td>${verdict}</td></tr>`;
    }
    blocks.push(`
      <h4>${turtleId} (Marginal=${t.marginal}, Plastron=${t.plastron}, needMod5=${t.plastron % 5})</h4>
      <table>
        <thead><tr><th>Ceque ID</th><th>Raw</th><th>Real</th><th>mod5</th><th>need</th><th>Angle</th><th>Verdict</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `);
  }
  document.getElementById('turtleReport').innerHTML = blocks.join('');
}

function renderTable(results, cequeTable) {
  const tbody = document.querySelector('#resultsTable tbody');
  tbody.innerHTML = '';
  for (const r of results) {
    const angleDeg = cequeTable.get(r.cequeId);
    const angleRad = angleDeg * Math.PI / 180;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.turtle}</td><td>${r.cequeId}</td><td>${angleDeg}</td><td>${angleRad.toFixed(6)}</td><td>${r.realDistance}</td>`;
    tbody.appendChild(tr);
  }
  document.getElementById('resultsTable').style.display = results.length ? 'table' : 'none';
}

let lastResults = [];
let lastCequeTable = null;

document.getElementById('solveBtn').addEventListener('click', async () => {
  const status = document.getElementById('status');
  status.textContent = '';

  const cequeFileEl = document.getElementById('cequeFile').files[0];
  const dataFileEl = document.getElementById('dataFile').files[0];
  if (!cequeFileEl || !dataFileEl) {
    status.textContent = 'กรุณาเลือกไฟล์ CSV ทั้งสองไฟล์ (Ceque table และ Quipu data)';
    return;
  }

  const [cequeText, dataText] = await Promise.all([cequeFileEl.text(), dataFileEl.text()]);

  const cequeTable = parseCequeTable(cequeText);
  const { turtles, records } = parseInput(dataText);
  const genuine = records.filter((r) => r.genuine);

  lastResults = genuine;
  lastCequeTable = cequeTable;

  renderTurtleReport(turtles, records, cequeTable);
  renderTable(genuine, cequeTable);
  document.getElementById('plot').innerHTML = renderPolarSVG(genuine, cequeTable);
  document.getElementById('exportBtn').disabled = genuine.length === 0;

  if (genuine.length === 0) {
    status.textContent = 'ไม่พบข้อมูลจริง (genuine) ในไฟล์นี้ — ทุกเส้นเป็นข้อมูลลวง';
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  let csv = 'radian,distance\n';
  for (const r of lastResults) {
    const angleDeg = lastCequeTable.get(r.cequeId);
    const angleRad = angleDeg * Math.PI / 180;
    csv += `${angleRad},${r.realDistance}\n`;
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'camp_locations.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
