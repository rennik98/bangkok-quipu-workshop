<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Quipu of Conquest — Spanish Camp Decoder</title>
<style>
  body { font-family: sans-serif; margin: 24px; color: #222; }
  .row { margin-bottom: 12px; }
  label { display: inline-block; min-width: 320px; }
  table { border-collapse: collapse; margin-top: 14px; }
  th, td { border: 1px solid #ccc; padding: 4px 12px; font-size: 14px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  th { background: #f0f0f0; }
  button { padding: 6px 14px; cursor: pointer; margin-right: 8px; }
  #plot { margin-top: 20px; }
  #status { color: #b00; margin-top: 8px; }
</style>
</head>
<body>
  <h2>Quipu of Conquest — Spanish Camp Decoder</h2>

  <div class="row">
    <label for="cequeFile">1) Ceque Angle Table CSV (ID, Angle deg):</label>
    <input type="file" id="cequeFile" accept=".csv">
  </div>
  <div class="row">
    <label for="dataFile">2) Turtle / Quipu Data CSV:</label>
    <input type="file" id="dataFile" accept=".csv">
  </div>
  <div class="row">
    <button id="solveBtn">Decode &amp; Plot</button>
    <button id="exportBtn" disabled>Export Results CSV (radian,distance)</button>
  </div>
  <div id="status"></div>

  <h3>Per-turtle breakdown (genuine + decoy)</h3>
  <div id="turtleReport"></div>

  <h3>Final genuine camp locations</h3>
  <table id="resultsTable" style="display:none">
    <thead>
      <tr>
        <th>Turtle</th><th>Ceque ID</th><th>Angle (deg)</th><th>Angle (rad)</th><th>Distance</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="plot"></div>

<script src="decoder.js"></script>
<script>
// rimTrailingEmpty, digitsToNumber, mod, parseCequeTable, parseInput,
// niceRingStep, polarToXY and renderPolarSVG come from decoder.js (shared with
// solve.js). Only DOM-specific rendering lives here.

function renderTurtleReport(turtles, records, cequeTable) {
  const byTurtle = new Map();
  for (const r of records) {
    if (!byTurtle.has(r.turtle)) byTurtle.set(r.turtle, []);
    byTurtle.get(r.turtle).push(r);
  }

  const blocks = [];
  for (const [turtleId, turtleRecords] of byTurtle.entries()) {
    const t = turtles.get(turtleId);
    let rows = '';
    for (const r of turtleRecords) {
      const verdict = r.genuine
        ? `<span style="color:#1a7f1a;font-weight:bold">GENUINE</span>`
        : `<span style="color:#999">decoy</span>`;
      const angle = r.genuine ? `${cequeTable.get(r.cequeId)}°` : '—';
      rows += `<tr><td>${r.cequeId}</td><td>${r.rawDistance}</td><td>${r.realDistance}</td><td>${r.actualMod}</td><td>${r.requiredMod}</td><td>${angle}</td><td>${verdict}</td></tr>`;
    }
    blocks.push(`
      <h4>${turtleId} (Marginal=${t.marginal}, Plastron=${t.plastron}, needMod5=${t.plastron % 5})</h4>
      <table>
        <thead><tr><th>Ceque ID</th><th>Raw</th><th>Real</th><th>mod5</th><th>need</th><th>Angle</th><th>Verdict</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `);
  }
  document.getElementById('turtleReport').innerHTML = blocks.join('');
}

function renderTable(results, cequeTable) {
  const tbody = document.querySelector('#resultsTable tbody');
  tbody.innerHTML = '';
  for (const r of results) {
    const angleDeg = cequeTable.get(r.cequeId);
    const angleRad = angleDeg * Math.PI / 180;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.turtle}</td><td>${r.cequeId}</td><td>${angleDeg}</td><td>${angleRad.toFixed(6)}</td><td>${r.realDistance}</td>`;
    tbody.appendChild(tr);
  }
  document.getElementById('resultsTable').style.display = results.length ? 'table' : 'none';
}

let lastResults = [];
let lastCequeTable = null;

document.getElementById('solveBtn').addEventListener('click', async () => {
  const status = document.getElementById('status');
  status.textContent = '';

  const cequeFileEl = document.getElementById('cequeFile').files[0];
  const dataFileEl = document.getElementById('dataFile').files[0];
  if (!cequeFileEl || !dataFileEl) {
    status.textContent = 'กรุณาเลือกไฟล์ CSV ทั้งสองไฟล์ (Ceque table และ Quipu data)';
    return;
  }

  const [cequeText, dataText] = await Promise.all([cequeFileEl.text(), dataFileEl.text()]);

  const cequeTable = parseCequeTable(cequeText);
  const { turtles, records } = parseInput(dataText);
  const genuine = records.filter((r) => r.genuine);

  lastResults = genuine;
  lastCequeTable = cequeTable;

  renderTurtleReport(turtles, records, cequeTable);
  renderTable(genuine, cequeTable);
  document.getElementById('plot').innerHTML = renderPolarSVG(genuine, cequeTable, { size: 720, maxR: 290 });
  document.getElementById('exportBtn').disabled = genuine.length === 0;

  if (genuine.length === 0) {
    status.textContent = 'ไม่พบข้อมูลจริง (genuine) ในไฟล์นี้ — ทุกเส้นเป็นข้อมูลลวง';
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  let csv = 'radian,distance\n';
  for (const r of lastResults) {
    const angleDeg = lastCequeTable.get(r.cequeId);
    const angleRad = angleDeg * Math.PI / 180;
    csv += `${angleRad},${r.realDistance}\n`;
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'camp_locations.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
